name: Modal Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Verify Modal installation
        run: |
          python -c "import modal; print(f'Modal version: {modal.__version__}')"
          which modal

      - name: Deploy to Modal
        env:
          # Modal会自动从这些环境变量读取认证信息
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # 验证Modal CLI可以正常工作
          modal --version
          
          # 部署应用
          modal deploy main.py --detach
          
          # 或者如果失败，尝试用Python直接调用
          # python -c "
          # import modal
          # app = modal.App('my-app')
          # print('Modal imported successfully')
          # "

      - name: Check deployment status
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal app list --json | head -20
